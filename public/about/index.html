      <script>
        let fuse;
        let data = [];

        const overlay = document.getElementById('search-overlay');
        const modal = document.getElementById('search-modal');
        const input = document.getElementById('search-input');
        const resultsDiv = document.getElementById('search-results');
        const trigger = document.getElementById('search-trigger');

        
        const indexUrl = "\/blog\/index.json";
        fetch(indexUrl)
          .then(res => res.json())
          .then(json => {
            data = json;

            fuse = new Fuse(data, {
              keys: [
                { name: "title", weight: 0.7 },
                { name: "content", weight: 0.3 }
              ],
              threshold: 0.3,
              ignoreLocation: true
            });
          });

        
        function openSearch() {
          overlay.style.display = 'block';
          setTimeout(() => input.focus(), 50);
        }

        
        function closeSearch() {
          overlay.style.display = 'none';
          input.value = '';
          resultsDiv.innerHTML = '';
        }

        
        trigger.addEventListener('click', openSearch);

        
        overlay.addEventListener('click', (e) => {
          if (!modal.contains(e.target)) {
            closeSearch();
          }
        });

        
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') closeSearch();
        });

        
        document.addEventListener('keydown', (e) => {
          if (e.key === '/' && document.activeElement !== input) {
            e.preventDefault();
            openSearch();
          }
        });

        
        function highlight(text, keyword) {
          if (!keyword) return text;
          
          
          const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          
          const regex = new RegExp(`(${escaped})`, 'gi');
          return text.replace(regex, '<mark>$1</mark>');
        }

        
        function smartSnippet(text, keyword, length = 120) {
          const index = text.toLowerCase().indexOf(keyword.toLowerCase());
          if (index === -1) return text.slice(0, length);

          const start = Math.max(0, index - 30);
          const end = start + length;

          return (start > 0 ? '...' : '') +
                 text.slice(start, end) +
                 (end < text.length ? '...' : '');
        }

        
        input.addEventListener('input', function () {
          const keyword = this.value.trim();

          if (!keyword) {
            resultsDiv.innerHTML = '';
            return;
          }

          const results = fuse.search(keyword);

          resultsDiv.innerHTML = results.map(r => {
            const item = r.item;
            const keyword = input.value.trim();

            const title = highlight(item.title, keyword);

            
            let summary = smartSnippet(item.content, keyword);
            
            
            summary = highlight(summary, keyword);

            return `
              <div class="search-item">
                <a href="${item.permalink}" target="_blank" >
                  <div class="search-title">${title}</div>
                  <div class="search-summary">${summary}</div>
                </a>
              </div>
            `;
          }).join('');

        });
      </script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.10/clipboard.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
      
      document.querySelectorAll('pre').forEach(function(block) {
          
          var button = document.createElement('button');
          button.className = 'copy-btn';
          button.textContent = '复制';

          
          block.appendChild(button);

          
          var clipboard = new ClipboardJS(button, {
              target: function() {
                  return block.querySelector('code');
              }
          });

          
          clipboard.on('success', function(e) {
              e.trigger.textContent = '复制成功';
              setTimeout(function() {
                  e.trigger.textContent = '复制';
              }, 2000);
          });

          
          clipboard.on('error', function(e) {
              e.trigger.textContent = '复制失败';
          });
      });
  });
</script>
